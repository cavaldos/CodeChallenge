services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5001
    container_name: frontend-app
    ports:
      - "5173:5173"
    networks:
      - app-network
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-app
    ports:
      - "5001:5001"
    networks:
      - app-network
    env_file: "./backend/.env"
    environment:
      NODE_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS}
    restart: always

networks:
  app-network:
    name: codechallenge-app-network
    driver: bridge
